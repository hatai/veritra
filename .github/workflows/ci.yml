name: ci

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      libsql:
        image: ghcr.io/tursodatabase/libsql-server:latest
        ports:
          - 8080:8080
        env:
          SQLD_NODE: primary

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - name: Wait for libSQL
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8080/health; then echo " libSQL ready"; exit 0; fi
            sleep 1
          done
          echo "libSQL did not become ready" >&2; exit 1

      - name: Migrate database schema
        run: pnpm db:migrate
        env:
          LIBSQL_URL: "http://127.0.0.1:8080"

      - run: pnpm test:run
        env:
          LIBSQL_URL: "http://127.0.0.1:8080"
